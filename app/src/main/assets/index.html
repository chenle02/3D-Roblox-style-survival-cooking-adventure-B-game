<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Servent Signal Lost</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#05070b;color:white;font-family:system-ui}#game{display:block;width:100vw;height:100vh;background:linear-gradient(#071625,#19160e)}#ui{position:fixed;inset:0;pointer-events:none}.panel{position:absolute;left:12px;top:10px;background:#081727dd;border:1px solid #24506d;border-radius:14px;padding:10px;min-width:260px}.title{font-size:20px;font-weight:900}.bar{height:12px;background:#111;border:1px solid #6af;border-radius:99px;overflow:hidden;margin-top:6px}.fill{height:100%;background:linear-gradient(90deg,#28e,#f33);width:100%}.hint{font-size:12px;color:#bcd;margin-top:5px}.btn{pointer-events:auto;position:absolute;border:0;border-radius:16px;background:#0b84ff;color:white;font-weight:900;padding:13px 18px}.joy{pointer-events:auto;position:absolute;left:28px;bottom:28px;width:126px;height:126px;border-radius:50%;background:#ffffff22;border:2px solid #ffffff55}.knob{position:absolute;left:38px;top:38px;width:46px;height:46px;border-radius:50%;background:#5df}.act{right:24px;bottom:38px}.jump{right:26px;bottom:105px;background:#18a058}.cook{right:115px;bottom:38px;background:#e85d04}.msg{position:absolute;right:12px;top:10px;width:330px;background:#100f18dd;border:1px solid #654;border-radius:14px;padding:10px}.choice{pointer-events:auto;margin-top:8px;margin-right:6px;border:0;border-radius:12px;background:#344;color:white;padding:9px;font-weight:800}</style></head><body><canvas id="game"></canvas><div id="ui"><div class="panel"><div class="title">Servent: Signal Lost</div><div>RoboChef Battery</div><div class="bar"><div id="battery" class="fill"></div></div><div id="stats" class="hint">Food 0 · Parts 0 · Signal 0</div><div class="hint">Move with joystick/WASD. Collect parts. Cook. Recharge before shutdown.</div></div><div class="msg"><b id="radio">Radio: ...static...</b><div id="story" class="hint">Strange transmissions are arriving from impossible places.</div><button class="choice" onclick="answer(1)">Answer signal</button><button class="choice" onclick="answer(2)">Ignore it</button></div><div id="joy" class="joy"><div id="knob" class="knob"></div></div><button class="btn jump" onclick="jump()">Jump</button><button class="btn cook" onclick="cook()">Cook</button><button class="btn act" onclick="act()">Interact</button></div><script>const c=document.getElementById('game'),x=c.getContext('2d');let W,H;function size(){W=c.width=innerWidth;H=c.height=innerHeight}onresize=size;size();let keys={},px=0,pz=0,vy=0,y=0,cam=0,batt=100,food=0,parts=0,signal=0,msg=0;let objs=[];function add(t,x,z){objs.push({t,x,z,a:Math.random()*6})}for(let i=0;i<20;i++)add(['part','solar','gen','meal'][i%4],Math.random()*1600-800,Math.random()*1600-800);onkeydown=e=>keys[e.key.toLowerCase()]=1;onkeyup=e=>keys[e.key.toLowerCase()]=0;let jx=0,jy=0;joy.ontouchmove=e=>{let r=joy.getBoundingClientRect(),t=e.touches[0];jx=(t.clientX-r.left-63)/63;jy=(t.clientY-r.top-63)/63;let m=Math.hypot(jx,jy);if(m>1){jx/=m;jy/=m}knob.style.left=38+jx*38+'px';knob.style.top=38+jy*38+'px'};joy.ontouchend=e=>{jx=jy=0;knob.style.left='38px';knob.style.top='38px'};function jump(){if(y<=0)vy=13}function cook(){if(parts>0&&batt>10){parts--;food++;batt-=10;flash('RoboChef cooked Quantum Noodles!')}}function act(){let n=near();if(!n){flash('Nothing nearby');return}if(n.t=='part'){parts++;flash('Collected robot part');remove(n)}else if(n.t=='solar'){batt=Math.min(100,batt+25);flash('Solar recharge +25%')}else if(n.t=='gen'){batt=Math.min(100,batt+45);flash('Generator recharge +45%')}else if(n.t=='meal'){food++;flash('Found absurd meal');remove(n)}}function answer(o){signal++;batt-=5;if(o==1){flash('You answered. The map shifted.');for(let i=0;i<4;i++)add('part',px+Math.random()*500-250,pz+Math.random()*500-250)}else flash('You ignored it. The static got louder.');radio.textContent='Radio: transmission '+signal;story.textContent=['Do not build the chef.','We found Earth, but not yours.','Turn off generator 3.','The soup is watching.'][signal%4]}function flash(s){story.textContent=s;msg=90}function remove(o){objs=objs.filter(q=>q!==o)}function near(){return objs.find(o=>Math.hypot(o.x-px,o.z-pz)<55)}function proj(x0,z0,h=0){let dx=x0-px,dz=z0-pz,cs=Math.cos(cam),sn=Math.sin(cam),rx=dx*cs-dz*sn,rz=dx*sn+dz*cs+520;if(rz<40)return null;let sc=420/rz;return [W/2+rx*sc,H*0.58-h*sc,sc,rz]}function cube(x0,z0,col,label){let p=proj(x0,z0,0);if(!p)return;let s=50*p[2];x.fillStyle=col;x.fillRect(p[0]-s/2,p[1]-s,s,s);x.strokeStyle='#fff8';x.strokeRect(p[0]-s/2,p[1]-s,s,s);x.fillStyle='white';x.font=Math.max(10,15*p[2])+'px system-ui';x.fillText(label,p[0]-s/2,p[1]-s-5)}function loop(){requestAnimationFrame(loop);let mx=(keys.d?1:0)-(keys.a?1:0)+jx,my=(keys.s?1:0)-(keys.w?1:0)+jy;if(keys.arrowleft)cam-=.045;if(keys.arrowright)cam+=.045;let sp=4;if(mx||my){let m=Math.hypot(mx,my);mx/=m;my/=m;px+=(mx*Math.cos(cam)-my*Math.sin(cam))*sp;pz+=(mx*Math.sin(cam)+my*Math.cos(cam))*sp;batt-=.015}vy-=.7;y=Math.max(0,y+vy);if(y==0&&vy<0)vy=0;if(batt<=0){batt=0;flash('RoboChef shut down forever. Find power next run.')}x.clearRect(0,0,W,H);let grd=x.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#071625');grd.addColorStop(.55,'#15120c');grd.addColorStop(1,'#0b1309');x.fillStyle=grd;x.fillRect(0,0,W,H);x.fillStyle='#263';x.fillRect(0,H*.58,W,H*.42);for(let i=-8;i<=8;i++){let a=proj(i*100,-900),b=proj(i*100,1000);if(a&&b){x.strokeStyle='#ffffff18';x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.stroke()}a=proj(-900,i*100);b=proj(900,i*100);if(a&&b){x.beginPath();x.moveTo(a[0],a[1]);x.lineTo(b[0],b[1]);x.stroke()}}cube(0,0,'#555','Radio');cube(120,40,'#953','Kitchen');cube(-140,80,'#246','Signal Tower');cube(230,-110,'#682','Solar Field');objs.sort((a,b)=>b.z-a.z).forEach(o=>cube(o.x,o.z,{part:'#aaa',solar:'#fc3',gen:'#48f',meal:'#f5a'}[o.t],o.t));let py=H*.58-55-y;x.fillStyle='#0cf';x.fillRect(W/2-24,py-48,48,70);x.fillStyle='#eee';x.fillRect(W/2-16,py-78,32,30);x.fillStyle='#f33';x.fillRect(W/2+20,py-38,14,45);x.fillStyle='#8ef';x.fillText('RoboChef',W/2-35,py-88);battery.style.width=batt+'%';stats.textContent='Food '+food+' · Parts '+parts+' · Signal '+signal+' · X '+px.toFixed(0)+' Z '+pz.toFixed(0)}loop();</script></body></html>
