<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Servent Signal Lost</title>
<style>
  *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#7ec8ff;font-family:Arial,system-ui,sans-serif;touch-action:none;user-select:none}#game{display:block;width:100vw;height:100vh}
  #ui{position:fixed;inset:0;pointer-events:none;color:white;text-shadow:2px 2px 0 #0008}
  .hud{position:absolute;left:12px;top:10px;width:250px;padding:9px 10px;background:#0006;border:3px solid #fff4;border-radius:8px;box-shadow:0 4px 0 #0005}.title{font-size:18px;font-weight:900;letter-spacing:1px}.small{font-size:12px;color:#e7f7ff;margin-top:3px}.bar{height:12px;background:#111;border:2px solid #fff8;margin-top:7px}.fill{height:100%;background:linear-gradient(90deg,#35f765,#ffe35c,#ff4b4b);width:100%}.stats{display:flex;gap:6px;margin-top:7px}.stat{flex:1;background:#0005;border:2px solid #fff4;border-radius:5px;text-align:center;padding:4px 2px}.stat b{display:block;font-size:18px}.stat span{font-size:10px;color:#d9ecff;text-transform:uppercase}
  .cross{position:absolute;left:50%;top:50%;width:28px;height:28px;transform:translate(-50%,-50%)}.cross:before,.cross:after{content:"";position:absolute;background:#fff;box-shadow:2px 2px 0 #0008}.cross:before{left:13px;top:0;width:3px;height:28px}.cross:after{top:13px;left:0;width:28px;height:3px}
  #hint{position:absolute;left:50%;top:calc(50% + 34px);transform:translateX(-50%);background:#0008;border:2px solid #fff7;border-radius:5px;padding:6px 10px;font-weight:900;opacity:0}.show{opacity:1!important}
  #radioBox{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(560px,54vw);padding:8px 11px;background:#0008;border:3px solid #fff7;border-radius:7px;font-weight:900;font-size:14px;line-height:1.25;text-align:center}.radioBtns{margin-top:6px;pointer-events:auto}.choice{border:3px solid #000;background:#eee;color:#111;font-weight:900;border-radius:4px;padding:5px 9px;margin:0 3px;box-shadow:0 3px 0 #0007}.choice:active,.btn:active{transform:translateY(2px);box-shadow:none}
  .joy{pointer-events:auto;position:absolute;left:20px;bottom:20px;width:112px;height:112px;border-radius:50%;background:#0004;border:4px solid #fff6}.knob{position:absolute;left:34px;top:34px;width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px #65d7ff,0 5px 0 #0005}
  .buttons{pointer-events:auto;position:absolute;right:18px;bottom:18px;display:grid;grid-template-columns:94px 94px;gap:8px}.btn{border:3px solid #000;border-radius:6px;padding:12px 4px;font-weight:900;font-size:15px;color:#111;box-shadow:0 4px 0 #0007}.jump{background:#8aff8a}.cook{background:#ffd45a}.act{background:#68ddff}.ping{background:#ff7b88}
  .hand{position:absolute;right:13vw;bottom:-8px;width:190px;height:130px;pointer-events:none;filter:drop-shadow(6px 8px 0 #0007)}.hand .arm{position:absolute;right:0;bottom:0;width:150px;height:50px;background:#b26b35;border:4px solid #4b2613;transform:rotate(-11deg)}.hand .tool{position:absolute;right:92px;bottom:55px;width:82px;height:35px;background:#cfd8dc;border:4px solid #263238;transform:rotate(-11deg)}.hand .light{position:absolute;right:152px;bottom:65px;width:22px;height:22px;background:#66ff66;border:4px solid #184518;transform:rotate(-11deg)}
  .lookTip{position:absolute;right:18px;top:12px;background:#0005;border:2px solid #fff4;border-radius:5px;padding:6px 8px;font-size:12px;text-align:right}
  @media(max-width:850px){.hud{width:200px;transform:scale(.86);transform-origin:left top}.title{font-size:16px}.lookTip{display:none}#radioBox{width:min(420px,42vw);font-size:12px;bottom:10px}.buttons{grid-template-columns:84px;right:12px;bottom:12px}.btn{padding:10px 3px}.joy{width:98px;height:98px}.knob{left:29px;top:29px}.hand{right:18vw;width:160px}.choice{padding:4px 6px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="hud"><div class="title">SERVENT SIGNAL LOST</div><div class="small">Minecraft/Roblox block mode</div><div class="bar"><div id="battery" class="fill"></div></div><div class="stats"><div class="stat"><b id="foodStat">0</b><span>Food</span></div><div class="stat"><b id="partStat">0</b><span>Parts</span></div><div class="stat"><b id="signalStat">0</b><span>Signal</span></div></div></div>
  <div class="lookTip">Drag screen to look<br>WASD / joystick to move</div>
  <div class="cross"></div><div id="hint">Interact</div>
  <div class="hand"><div class="arm"></div><div class="tool"></div><div class="light"></div></div>
  <div id="radioBox"><span id="radio">Radio:</span> <span id="story">static from the cooking station...</span><div class="radioBtns"><button class="choice" onclick="answer(1)">Answer</button><button class="choice" onclick="answer(2)">Ignore</button></div></div>
  <div id="joy" class="joy"><div id="knob" class="knob"></div></div>
  <div class="buttons"><button class="btn jump" onclick="jump()">Jump</button><button class="btn cook" onclick="cook()">Cook</button><button class="btn act" onclick="act()">Interact</button><button class="btn ping" onclick="ping()">Ping</button></div>
</div>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');let W,H,DPR=Math.min(devicePixelRatio||1,2);function resize(){W=innerWidth;H=innerHeight;c.width=W*DPR;c.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
let keys={},px=20,pz=-180,eyeY=0,vy=0,cam=0,pitch=0,jx=0,jy=0,batt=100,food=0,parts=0,signal=0,bob=0,toast=0;let objs=[];let clouds=[];
const fixed=[{t:'radio',x:0,z:0,y:0,w:110,h:90,color:'#795548',top:'#a1887f',label:'Radio Hut'},{t:'kitchen',x:150,z:60,y:0,w:90,h:70,color:'#ff8f00',top:'#ffd54f',label:'Kitchen'},{t:'tower',x:-150,z:130,y:0,w:65,h:170,color:'#607d8b',top:'#b0bec5',label:'Tower'},{t:'solar',x:260,z:-120,y:0,w:90,h:28,color:'#1565c0',top:'#42a5f5',label:'Solar'}];
const lines=['We found Earth, but not yours.','The soup is watching.','Build the chef before night.','Generator 3 remembers you.','Do not trust the square moon.'];
function add(t,x,z){let data={part:['#b0bec5','#eceff1','Part'],meal:['#8d6e63','#ffcc80','Meal'],gen:['#455a64','#90a4ae','Generator'],solar:['#1565c0','#42a5f5','Solar']}[t];objs.push({t,x,z,y:0,w:t==='gen'?70:48,h:t==='solar'?24:48,color:data[0],top:data[1],label:data[2]})}
for(let i=0;i<34;i++)add(['part','meal','gen','solar'][i%4],Math.random()*1800-900,Math.random()*1600-700);for(let i=0;i<10;i++)clouds.push({x:Math.random()*W,y:40+Math.random()*100,s:35+Math.random()*55});
onkeydown=e=>keys[e.key.toLowerCase()]=1;onkeyup=e=>keys[e.key.toLowerCase()]=0;
function joySet(cx,cy){let r=joy.getBoundingClientRect();jx=(cx-r.left-r.width/2)/(r.width/2);jy=(cy-r.top-r.height/2)/(r.height/2);let m=Math.hypot(jx,jy);if(m>1){jx/=m;jy/=m}knob.style.left=(r.width/2-19+jx*(r.width*.29))+'px';knob.style.top=(r.height/2-19+jy*(r.height*.29))+'px'}
joystick=false;joy.addEventListener('touchmove',e=>{e.preventDefault();let t=e.touches[0];joySet(t.clientX,t.clientY)},{passive:false});joy.addEventListener('touchend',()=>{jx=jy=0;knob.style.left='';knob.style.top=''});
let look=false,lx=0,ly=0;c.addEventListener('pointerdown',e=>{look=true;lx=e.clientX;ly=e.clientY});addEventListener('pointerup',()=>look=false);addEventListener('pointermove',e=>{if(!look)return;cam+=(e.clientX-lx)*.006;pitch+=(e.clientY-ly)*.004;pitch=Math.max(-.34,Math.min(.34,pitch));lx=e.clientX;ly=e.clientY});
function say(s){story.textContent=s;toast=120}function jump(){if(eyeY<=0)vy=10}function cook(){if(parts>0&&batt>10){parts--;food++;batt-=10;say('RoboChef cooked blocky noodles!')}else say(parts<=0?'Need robot parts to cook.':'Battery too low.')}function ping(){batt=Math.max(0,batt-2);let n=near(150);say(n?'Nearest block: '+n.label:'Only grass and clouds nearby.')}function answer(o){signal++;batt=Math.max(0,batt-5);radio.textContent='Radio '+signal+':';say(o===1?lines[signal%lines.length]:'Static gets louder.');if(o===1)for(let i=0;i<4;i++)add('part',px+Math.random()*400-200,pz+Math.random()*400-200)}
function all(){return fixed.concat(objs)}function dist(o){return Math.hypot(o.x-px,o.z-pz)}function near(d=75){let b=null,bd=1e9;for(const o of all()){let dd=dist(o);if(dd<d&&dd<bd){b=o;bd=dd}}return b}function remove(o){objs=objs.filter(q=>q!==o)}function act(){let n=near();if(!n){say('Walk closer to a block/object.');return}if(n.t==='part'){parts++;remove(n);say('Picked up robot part.')}else if(n.t==='meal'){food++;remove(n);say('Picked up food.')}else if(n.t==='gen'){batt=Math.min(100,batt+45);say('Generator charged battery.')}else if(n.t==='solar'){batt=Math.min(100,batt+25);say('Solar panel charged battery.')}else if(n.t==='kitchen')cook();else if(n.t==='radio')answer(1);else{signal++;say('Signal tower tuned.')}}
function proj(x,z,y=0){let dx=x-px,dz=z-pz,cs=Math.cos(cam),sn=Math.sin(cam),rx=dx*cs-dz*sn,rz=dx*sn+dz*cs;if(rz<20)return null;let f=480/rz,hor=H*(.53+pitch);return{x:W/2+rx*f,y:hor-(y-eyeY)*f,s:f,z:rz}}
function block(o){let p=proj(o.x,o.z,o.y);if(!p)return;let w=Math.max(6,o.w*p.s),h=Math.max(8,o.h*p.s),d=Math.max(5,o.w*.45*p.s),x=p.x-w/2,y=p.y-h;ctx.globalAlpha=Math.max(.25,Math.min(1,900/p.z));ctx.fillStyle=o.color;ctx.fillRect(x,y,w,h);ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(x+w,y+d,w*.24,h);ctx.fillStyle=o.top;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+d,y-d);ctx.lineTo(x+w+d,y-d);ctx.lineTo(x+w,y);ctx.closePath();ctx.fill();ctx.strokeStyle='#0008';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+d,y-d);ctx.lineTo(x+w+d,y-d);ctx.lineTo(x+w,y);ctx.stroke();ctx.fillStyle='white';ctx.font=Math.max(9,13*p.s)+'px Arial';ctx.textAlign='center';ctx.lineWidth=4;ctx.strokeStyle='#000';ctx.strokeText(o.label,p.x,y-8);ctx.fillText(o.label,p.x,y-8);ctx.globalAlpha=1}
function grassTile(x,z){let p=proj(x,z,0);if(!p)return;let s=95*p.s;if(s<3)return;ctx.fillStyle='#58b947';ctx.fillRect(p.x-s/2,p.y-s/3,s,s/3);ctx.fillStyle='#7bd957';ctx.fillRect(p.x-s/2,p.y-s/3,s,s/12);ctx.strokeStyle='rgba(0,0,0,.18)';ctx.strokeRect(p.x-s/2,p.y-s/3,s,s/3)}
function drawSky(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#58a8ff');g.addColorStop(.55,'#9bd8ff');g.addColorStop(.56,'#63c95f');g.addColorStop(1,'#2e8d3d');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(const cl of clouds){ctx.fillStyle='#fff';ctx.fillRect(cl.x,cl.y,cl.s,cl.s*.32);ctx.fillRect(cl.x+cl.s*.7,cl.y-cl.s*.22,cl.s*1.25,cl.s*.42);ctx.fillRect(cl.x+cl.s*1.7,cl.y,cl.s*.85,cl.s*.32);ctx.fillStyle='#d8edff';ctx.fillRect(cl.x,cl.y+cl.s*.32,cl.s*2.55,cl.s*.12)}ctx.fillStyle='#70d763';ctx.fillRect(0,H*.56,W,H*.44)}
function drawGround(){for(let gx=-10;gx<=10;gx++)for(let gz=-2;gz<=18;gz++)grassTile(gx*110,gz*110)}
function update(){let st=(keys.d?1:0)-(keys.a?1:0)+jx,fw=(keys.w?1:0)-(keys.s?1:0)-jy;if(keys.arrowleft)cam-=.045;if(keys.arrowright)cam+=.045;if(keys.arrowup)pitch-=.02;if(keys.arrowdown)pitch+=.02;pitch=Math.max(-.34,Math.min(.34,pitch));let moving=Math.hypot(st,fw)>.05;if(moving){let m=Math.hypot(st,fw);st/=m;fw/=m;let sp=keys.shift?6:4;px+=(st*Math.cos(cam)+fw*Math.sin(cam))*sp;pz+=(-st*Math.sin(cam)+fw*Math.cos(cam))*sp;batt=Math.max(0,batt-(keys.shift?.025:.014));bob+=.17}else bob*=.9;vy-=.62;eyeY=Math.max(0,eyeY+vy);if(eyeY===0&&vy<0)vy=0;if(batt<=0)say('Battery empty. Find solar or generator.');battery.style.width=batt+'%';foodStat.textContent=food;partStat.textContent=parts;signalStat.textContent=signal;let n=near(82);hint.textContent=n?'Interact: '+n.label:'';hint.classList.toggle('show',!!n);document.querySelector('.hand').style.transform='translateY('+Math.sin(bob)*5+'px)'}
function draw(){drawSky();drawGround();let arr=all().slice().sort((a,b)=>dist(b)-dist(a));for(const o of arr)block(o)}
function loop(){requestAnimationFrame(loop);update();draw()}loop();
</script>
</body>
</html>
