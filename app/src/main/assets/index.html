<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Servent Signal Lost</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#7fc8ff;font-family:Arial,system-ui,sans-serif;touch-action:none;user-select:none}#game{display:block;width:100vw;height:100vh}
#ui{position:fixed;inset:0;pointer-events:none;color:#fff;text-shadow:2px 2px 0 #000}.hud{position:absolute;left:10px;top:8px;width:176px;padding:7px 8px;background:#0005;border:2px solid #fff7;border-radius:6px}.title{font-size:14px;font-weight:900;line-height:1.05}.mini{font-size:11px;margin-top:4px}.bar{height:9px;background:#111;border:2px solid #fff8;margin-top:5px}.fill{height:100%;background:linear-gradient(90deg,#4dff63,#ffe761,#ff4e4e)}.stats{display:flex;gap:4px;margin-top:5px}.stat{flex:1;text-align:center;background:#0005;border:1px solid #fff6;border-radius:3px;padding:2px}.stat b{font-size:14px}.stat span{display:block;font-size:8px}.cross{position:absolute;left:50%;top:50%;width:26px;height:26px;transform:translate(-50%,-50%)}.cross:before,.cross:after{content:"";position:absolute;background:#fff;box-shadow:2px 2px 0 #000}.cross:before{left:12px;top:0;width:3px;height:26px}.cross:after{top:12px;left:0;width:26px;height:3px}#hint{position:absolute;left:50%;top:calc(50% + 32px);transform:translateX(-50%);background:#0008;border:2px solid #fff8;border-radius:4px;padding:5px 9px;font-size:13px;font-weight:900;opacity:0}.show{opacity:1!important}
#radioBox{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:min(430px,46vw);padding:6px 8px;background:#0008;border:2px solid #fff8;border-radius:5px;text-align:center;font-size:12px;font-weight:900;line-height:1.2}.radioBtns{margin-top:4px;pointer-events:auto}.choice{border:2px solid #000;background:#eee;color:#111;border-radius:3px;font-weight:900;padding:3px 7px;margin:0 2px;box-shadow:0 2px 0 #0008}
.joy{pointer-events:auto;position:absolute;left:18px;bottom:18px;width:96px;height:96px;border-radius:50%;background:#0004;border:4px solid #fff7}.knob{position:absolute;left:27px;top:27px;width:36px;height:36px;border-radius:50%;background:#fff;box-shadow:0 0 0 4px #67dfff,0 4px 0 #0006}.buttons{pointer-events:auto;position:absolute;right:14px;bottom:14px;display:grid;grid-template-columns:82px;gap:7px}.btn{border:3px solid #000;border-radius:5px;font-size:13px;font-weight:900;color:#111;padding:9px 2px;box-shadow:0 4px 0 #0008}.jump{background:#8bff8b}.cook{background:#ffd75c}.act{background:#66ddff}.ping{background:#ff7888}.hand{position:absolute;right:17vw;bottom:-24px;width:118px;height:82px;pointer-events:none;filter:drop-shadow(5px 6px 0 #0007)}.arm{position:absolute;right:0;bottom:0;width:105px;height:32px;background:#b46b36;border:4px solid #482512;transform:rotate(-11deg)}.tool{position:absolute;right:70px;bottom:37px;width:56px;height:25px;background:#cfd8dc;border:4px solid #263238;transform:rotate(-11deg)}.light{position:absolute;right:109px;bottom:43px;width:15px;height:15px;background:#66ff66;border:3px solid #184518;transform:rotate(-11deg)}
@media(max-width:850px){.hud{width:150px;transform:scale(.84);transform-origin:left top}.buttons{grid-template-columns:74px}.btn{font-size:12px;padding:8px 1px}.joy{width:84px;height:84px}.knob{left:23px;top:23px;width:30px;height:30px}#radioBox{width:38vw;font-size:10px}.hand{width:95px;right:20vw}.arm{width:82px;height:26px}.tool{right:54px;width:44px;height:20px}.light{right:85px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"><div class="hud"><div class="title">SERVENT<br>SIGNAL LOST</div><div class="mini">Block survival</div><div class="bar"><div id="battery" class="fill"></div></div><div class="stats"><div class="stat"><b id="foodStat">0</b><span>FOOD</span></div><div class="stat"><b id="partStat">0</b><span>PARTS</span></div><div class="stat"><b id="signalStat">0</b><span>SIGNAL</span></div></div></div><div class="cross"></div><div id="hint">Interact</div><div class="hand"><div class="arm"></div><div class="tool"></div><div class="light"></div></div><div id="radioBox"><span id="radio">Radio:</span> <span id="story">static...</span><div class="radioBtns"><button class="choice" onclick="answer(1)">Answer</button><button class="choice" onclick="answer(2)">Ignore</button></div></div><div id="joy" class="joy"><div id="knob" class="knob"></div></div><div class="buttons"><button class="btn jump" onclick="jump()">Jump</button><button class="btn cook" onclick="cook()">Cook</button><button class="btn act" onclick="act()">Use</button><button class="btn ping" onclick="ping()">Ping</button></div></div>
<script>
const c=document.getElementById('game'),g=c.getContext('2d');let W,H,DPR=Math.min(devicePixelRatio||1,2);function size(){W=innerWidth;H=innerHeight;c.width=W*DPR;c.height=H*DPR;g.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',size);size();
let keys={},px=0,pz=-260,eyeY=20,vy=0,cam=0,pitch=-.06,jx=0,jy=0,batt=100,food=0,parts=0,signal=0,bob=0,msgTimer=0;const blocks=[],clouds=[];
function makeBlock(t,x,z,w,h,c,top,label){blocks.push({t,x,z,w,h,c,top,label})}
makeBlock('radio',0,0,95,70,'#795548','#a1887f','Radio');makeBlock('kitchen',180,70,85,85,'#ff9800','#ffd54f','Kitchen');makeBlock('tower',-190,130,55,145,'#607d8b','#cfd8dc','Tower');makeBlock('solar',280,-110,95,30,'#1565c0','#64b5f6','Solar');
function add(t,x,z){let d={part:[34,34,'#b0bec5','#eceff1','Part'],meal:[38,30,'#8d6e63','#ffcc80','Meal'],gen:[52,52,'#455a64','#90a4ae','Generator'],solar:[60,24,'#1565c0','#42a5f5','Solar']}[t];makeBlock(t,x,z,d[0],d[1],d[2],d[3],d[4])}for(let i=0;i<30;i++)add(['part','meal','gen','solar'][i%4],Math.random()*1800-900,Math.random()*1700-500);for(let i=0;i<9;i++)clouds.push({x:Math.random()*900-450,z:350+Math.random()*1000,y:180+Math.random()*70,s:45+Math.random()*55});
onkeydown=e=>keys[e.key.toLowerCase()]=1;onkeyup=e=>keys[e.key.toLowerCase()]=0;function jset(cx,cy){let r=joy.getBoundingClientRect();jx=(cx-r.left-r.width/2)/(r.width/2);jy=(cy-r.top-r.height/2)/(r.height/2);let m=Math.hypot(jx,jy);if(m>1){jx/=m;jy/=m}knob.style.left=(r.width/2-18+jx*r.width*.28)+'px';knob.style.top=(r.height/2-18+jy*r.height*.28)+'px'}joy.addEventListener('touchmove',e=>{e.preventDefault();jset(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});joy.addEventListener('touchend',()=>{jx=jy=0;knob.style.left='';knob.style.top=''});let look=0,lx=0,ly=0;c.addEventListener('pointerdown',e=>{look=1;lx=e.clientX;ly=e.clientY});addEventListener('pointerup',()=>look=0);addEventListener('pointermove',e=>{if(!look)return;cam+=(e.clientX-lx)*.006;pitch+=(e.clientY-ly)*.003;pitch=Math.max(-.28,Math.min(.25,pitch));lx=e.clientX;ly=e.clientY});
function say(s){story.textContent=s;msgTimer=120}function jump(){if(eyeY<=20)vy=10}function cook(){if(parts>0&&batt>10){parts--;food++;batt-=10;say('Cooked block noodles.')}else say(parts?'Battery too low.':'Need parts.')}function ping(){batt=Math.max(0,batt-2);let n=near(150);say(n?'Near: '+n.label:'No object nearby.')}function answer(o){signal++;batt=Math.max(0,batt-5);radio.textContent='Radio '+signal+':';say(o==1?['Earth is not yours.','The soup watches.','Find Generator 3.','Build RoboChef.'][signal%4]:'Static grows louder.');if(o==1)for(let i=0;i<3;i++)add('part',px+Math.random()*380-190,pz+Math.random()*380-190)}function dist(o){return Math.hypot(o.x-px,o.z-pz)}function near(d=70){let b=null,bd=1e9;for(const o of blocks){let dd=dist(o);if(dd<d&&dd<bd){b=o;bd=dd}}return b}function remove(o){let i=blocks.indexOf(o);if(i>=0)blocks.splice(i,1)}function act(){let n=near();if(!n){say('Move closer.');return}if(n.t=='part'){parts++;remove(n);say('Picked up part.')}else if(n.t=='meal'){food++;remove(n);say('Picked up food.')}else if(n.t=='gen'){batt=Math.min(100,batt+45);say('Generator charged.')}else if(n.t=='solar'){batt=Math.min(100,batt+25);say('Solar charged.')}else if(n.t=='kitchen')cook();else if(n.t=='radio')answer(1);else say('Used '+n.label+'.')}
function proj(x,z,y=0){let dx=x-px,dz=z-pz,cs=Math.cos(cam),sn=Math.sin(cam),rx=dx*cs-dz*sn,rz=dx*sn+dz*cs;if(rz<35)return null;let f=420/rz,hor=H*(.50+pitch);return{x:W/2+rx*f,y:hor-(y-eyeY)*f,s:f,z:rz}}
function face(points,color,stroke=true){g.fillStyle=color;g.beginPath();g.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++)g.lineTo(points[i].x,points[i].y);g.closePath();g.fill();if(stroke){g.strokeStyle='#0008';g.lineWidth=2;g.stroke()}}
function cube(o){let hw=o.w/2,d=o.w/2,h=o.h;let p1=proj(o.x-hw,o.z-d,0),p2=proj(o.x+hw,o.z-d,0),p3=proj(o.x+hw,o.z+d,0),p4=proj(o.x-hw,o.z+d,0),t1=proj(o.x-hw,o.z-d,h),t2=proj(o.x+hw,o.z-d,h),t3=proj(o.x+hw,o.z+d,h),t4=proj(o.x-hw,o.z+d,h);if(!p1||!p2||!p3||!p4||!t1||!t2||!t3||!t4)return;g.globalAlpha=Math.max(.35,Math.min(1,900/proj(o.x,o.z,0).z));face([p1,p2,t2,t1],shade(o.c,.85));face([p2,p3,t3,t2],shade(o.c,.65));face([p3,p4,t4,t3],shade(o.c,.75));face([t1,t2,t3,t4],o.top);g.globalAlpha=1;if(dist(o)<180){let pp=proj(o.x,o.z,h+18);if(pp){g.font='12px Arial';g.textAlign='center';g.lineWidth=4;g.strokeStyle='#000';g.strokeText(o.label,pp.x,pp.y);g.fillStyle='#fff';g.fillText(o.label,pp.x,pp.y)}}}
function shade(hex,k){let n=parseInt(hex.slice(1),16),r=n>>16&255,gg=n>>8&255,b=n&255;return`rgb(${r*k|0},${gg*k|0},${b*k|0})`}function sky(){let gr=g.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#4ea1ff');gr.addColorStop(.55,'#b7e3ff');gr.addColorStop(.56,'#62c957');gr.addColorStop(1,'#3ca843');g.fillStyle=gr;g.fillRect(0,0,W,H)}function cloud(cl){let p=proj(cl.x,cl.z,cl.y);if(!p)return;let s=cl.s*p.s;g.fillStyle='#fff';g.fillRect(p.x-s,p.y,s*1.1,s*.28);g.fillRect(p.x-s*.2,p.y-s*.25,s*1.55,s*.38);g.fillRect(p.x+s,p.y,s*.9,s*.28);g.fillStyle='#d6ecff';g.fillRect(p.x-s,p.y+s*.28,s*2.9,s*.12)}
function tile(x,z){let p1=proj(x-60,z-60,0),p2=proj(x+60,z-60,0),p3=proj(x+60,z+60,0),p4=proj(x-60,z+60,0);if(!p1||!p2||!p3||!p4)return;face([p1,p2,p3,p4],((x/120+z/120)&1)?'#60c94d':'#55b943',false);g.strokeStyle='#3a8f2e';g.lineWidth=1;g.beginPath();g.moveTo(p1.x,p1.y);g.lineTo(p2.x,p2.y);g.lineTo(p3.x,p3.y);g.lineTo(p4.x,p4.y);g.closePath();g.stroke()}function draw(){sky();for(let x=-8;x<=8;x++)for(let z=-2;z<=18;z++)tile(x*120,z*120);clouds.forEach(cloud);blocks.slice().sort((a,b)=>dist(b)-dist(a)).forEach(cube)}
function update(){let st=(keys.d?1:0)-(keys.a?1:0)+jx,fw=(keys.w?1:0)-(keys.s?1:0)-jy;if(keys.arrowleft)cam-=.045;if(keys.arrowright)cam+=.045;if(keys.arrowup)pitch-=.018;if(keys.arrowdown)pitch+=.018;pitch=Math.max(-.28,Math.min(.25,pitch));if(Math.hypot(st,fw)>.04){let m=Math.hypot(st,fw);st/=m;fw/=m;let sp=keys.shift?6:4;px+=(st*Math.cos(cam)+fw*Math.sin(cam))*sp;pz+=(-st*Math.sin(cam)+fw*Math.cos(cam))*sp;batt=Math.max(0,batt-(keys.shift?.025:.014));bob+=.16}else bob*=.9;vy-=.55;eyeY=Math.max(20,eyeY+vy);if(eyeY==20&&vy<0)vy=0;battery.style.width=batt+'%';foodStat.textContent=food;partStat.textContent=parts;signalStat.textContent=signal;let n=near(76);hint.textContent=n?'Use: '+n.label:'';hint.classList.toggle('show',!!n);document.querySelector('.hand').style.transform='translateY('+Math.sin(bob)*4+'px)';if(msgTimer>0)msgTimer--}
function loop(){requestAnimationFrame(loop);update();draw()}loop();
</script>
</body>
</html>
